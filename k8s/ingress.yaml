apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: henius-ingress
  namespace: henius
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
spec:
  tls:
    - hosts:
        - henius.cilas.dev
        - henius-server.cilas.dev
      secretName: henius-tls
  rules:
    # Game client (web app)
    - host: henius.cilas.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: game
                port:
                  number: 80
    # Colyseus game server (WebSocket)
    - host: henius-server.cilas.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: server
                port:
                  number: 2567
